version: '3.8'

services:
  esxi-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VCS_REF: ${VCS_REF:-$(git rev-parse --short HEAD)}
        VERSION: ${VERSION:-1.0.0}
    image: uldyssian-sh/vmware-esxi-mcp:${VERSION:-latest}
    container_name: vmware-esxi-mcp
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"  # Metrics port
    environment:
      - ESXI_HOST=${ESXI_HOST}
      - ESXI_USERNAME=${ESXI_USERNAME}
      - ESXI_PASSWORD=${ESXI_PASSWORD}
      - MCP_API_KEY=${MCP_API_KEY}
      - MCP_LOG_LEVEL=${MCP_LOG_LEVEL:-INFO}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - esxi_mcp_logs:/app/logs
      - esxi_mcp_data:/app/data
      - esxi_mcp_backup:/app/backup
    networks:
      - esxi_mcp_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  prometheus:
    image: prom/prometheus:latest
    container_name: esxi-mcp-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - esxi_mcp_network
    depends_on:
      - esxi-mcp

  grafana:
    image: grafana/grafana:latest
    container_name: esxi-mcp-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - esxi_mcp_network
    depends_on:
      - prometheus

volumes:
  esxi_mcp_logs:
    driver: local
  esxi_mcp_data:
    driver: local
  esxi_mcp_backup:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  esxi_mcp_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16